name: Auto label issues

on:
  issues:
    types: [opened, edited, reopened]

permissions:
  issues: write

jobs:
  auto-label:
    runs-on: ubuntu-latest
    steps:
      - name: Apply issue labels
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const text = `${issue.title}\n${issue.body ?? ""}`.toLowerCase();

            const labelDefinitions = {
              patent: {
                color: "5319e7",
                description: "Patent filing, prior-art, and IP strategy work"
              },
              research: {
                color: "0052cc",
                description: "Research and evidence-gathering work"
              },
              "go-to-market": {
                color: "0e8a16",
                description: "Launch strategy, packaging, and market readiness"
              },
              "product-discovery": {
                color: "fbca04",
                description: "Diagrams, prototyping, and discovery requirements"
              }
            };

            const selected = new Set(["enhancement"]);

            if (/\bpatent\b|\bcopyright\b|\bprior art\b|\bintellectual property\b|\bip\b/.test(text)) {
              selected.add("patent");
            }

            if (/research|whitepaper|paper|investigate|analysis/.test(text)) {
              selected.add("research");
            }

            if (/ship to market|go to market|launch|market/.test(text)) {
              selected.add("go-to-market");
            }

            if (/figma|diagram|3d|protocol|tester|testing team/.test(text)) {
              selected.add("product-discovery");
            }

            for (const [name, meta] of Object.entries(labelDefinitions)) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name
                });
              } catch (error) {
                if (error.status === 404) {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name,
                    color: meta.color,
                    description: meta.description
                  });
                } else {
                  throw error;
                }
              }
            }

            const existingLabels = issue.labels.map((label) =>
              typeof label === "string" ? label : label.name
            );

            const labelsToAdd = [...selected].filter((label) => !existingLabels.includes(label));

            if (labelsToAdd.length === 0) {
              return;
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: labelsToAdd
            });
